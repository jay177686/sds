name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3-dev git \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
          default-jdk unzip pkg-config python3-pip

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer kivy cython

    # ✅ 关键新增步骤（必须有）
    - name: Accept Android licenses and install SDK
      run: |
        yes | sdkmanager --licenses
        sdkmanager --update
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-33"
        sdkmanager "build-tools;33.0.2"

    - name: Initialize Buildozer / Python-for-Android
      run: |
        buildozer android update

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: OvertimeTracker-apk
        path: bin/*.apk
