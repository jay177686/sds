name: Build APK (Docker Stable Ultimate)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # 🚀 使用稳定 buildozer Docker 镜像
    - name: Build APK with Docker Buildozer
      run: |
        docker run --rm \
          -v $PWD:/home/user/app \
          -w /home/user/app \
          kivy/buildozer:latest \
          bash -lc "
            pip install --upgrade pip &&
            buildozer android clean &&
            buildozer android debug
          "

    # 📦 上传 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
