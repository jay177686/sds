name: Build APK (Docker Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    # 🔥 用 Docker 官方 Buildozer 环境
    - name: Build APK with Buildozer Docker
      run: |
        docker run --rm \
          -v $PWD:/home/user/hostcwd \
          -w /home/user/hostcwd \
          kivy/buildozer:latest \
          buildozer android debug

    # 🔥 上传 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
