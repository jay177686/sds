name: Build APK (Docker Ultimate Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 📥 拉代码
    - name: Checkout repo
      uses: actions/checkout@v4

    # 🚀 Docker Buildozer 构建（已解决 root / 交互 / SDK 问题）
    - name: Build APK (Docker)
      run: |
        docker run --rm \
          -v $PWD:/home/user/app \
          -w /home/user/app \
          -e BUILDOZER_ALLOW_ROOT=1 \
          kivy/buildozer:latest \
          bash -lc "
            export BUILDOZER_ALLOW_ROOT=1 &&
            pip install --upgrade pip &&
            buildozer android clean &&
            buildozer android debug
          "

    # 📦 上传 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
