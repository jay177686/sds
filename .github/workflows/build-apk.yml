name: Build APK (Docker Ultimate Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # 🚀 关键修复：禁用交互 + root检查
    - name: Build APK (Docker)
      run: |
        docker run --rm \
          -v $PWD:/home/user/app \
          -w /home/user/app \
          kivy/buildozer:latest \
          bash -lc "
            export BUILDOZER_WARN_ON_ROOT=0 &&
            export PIP_NO_INPUT=1 &&
            pip install --upgrade pip &&
            buildozer android clean &&
            buildozer -v android debug --noinput
          "

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
