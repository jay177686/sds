name: Build APK (NO 37 FIX)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git unzip wget openjdk-17-jdk \
          python3-pip build-essential

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython kivy

    # 🔥 安装 SDK
    - name: Install Android SDK
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
        unzip sdk.zip -d cmdline-tools

        mv cmdline-tools/cmdline-tools cmdline-tools/latest

        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

    # 🔥 强制接受 license（关键）
    - name: Accept licenses
      run: |
        yes | sdkmanager --licenses || true

    # 🚨 核心修复：强制只允许 33，不让 37出现
    - name: Install ONLY stable SDK
      run: |
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools"
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-33"
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;33.0.2"

    # 🔥 防缓存污染
    - name: Clean
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    # 🚀 Build
    - name: Build APK
      run: |
        buildozer -v android debug

    # 📦 Upload
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
